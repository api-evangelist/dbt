openapi: 3.1.0
info:
  title: dbt Cloud Administrative Accounts Metadata API
  description: The dbt Cloud Administrative API enables programmatic management of dbt Cloud accounts, projects, jobs, runs, environments, and other resources. The API supports automation of dbt Cloud workflows and integration with external orchestration tools.
  version: '3'
  contact:
    name: dbt Labs Support
    url: https://www.getdbt.com/community
servers:
- url: https://cloud.getdbt.com/api/v3
  description: Multi-tenant production
- url: https://cloud.getdbt.com/api/v2
  description: Legacy v2 API
security:
- bearerAuth: []
tags:
- name: Metadata
paths:
  /graphql:
    post:
      summary: Execute a Discovery API GraphQL query
      operationId: executeDiscoveryQuery
      tags:
      - Metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - query
              properties:
                query:
                  type: string
                variables:
                  type: object
      responses:
        '200':
          description: GraphQL response containing requested metadata.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
