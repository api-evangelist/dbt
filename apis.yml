- aid: dbt:dbt-cloud-discovery-api
  name: dbt Cloud Discovery API
  description: Every time dbt Cloud runs a project, it generates and stores information about the project. The Discovery API
    exposes that metadata including details about models, sources, exposures, and execution results so teams can understand
    and govern their DAG.
  humanURL: https://docs.getdbt.com/docs/dbt-cloud-apis/discovery-api
  baseURL: https://metadata.cloud.getdbt.com/graphql
  tags:
  - Discovery
  - GraphQL
  - Lineage
  - Metadata
  properties:
  - type: Documentation
    url: https://docs.getdbt.com/docs/dbt-cloud-apis/discovery-api
  - type: OpenAPI
    url: openapi/dbt-cloud-discovery-api-openapi.yml
  - type: NaftikoCapability
    url: capabilities/cloud-discovery-metadata.yaml
- aid: dbt:dbt-cloud-semantic-layer-api
  name: dbt Cloud Semantic Layer API
  description: The dbt Semantic Layer lets teams define metrics in code with MetricFlow and query them consistently from BI
    tools, notebooks, and applications. The Semantic Layer API exposes metric and dimension queries via GraphQL, JDBC, and
    a Python SDK.
  humanURL: https://docs.getdbt.com/docs/dbt-cloud-apis/sl-api-overview
  baseURL: https://semantic-layer.cloud.getdbt.com/api/graphql
  tags:
  - Dimensions
  - GraphQL
  - JDBC
  - MetricFlow
  - Metrics
  - Semantic Layer
  properties:
  - type: Documentation
    url: https://docs.getdbt.com/docs/dbt-cloud-apis/sl-api-overview
  - type: OpenAPI
    url: openapi/dbt-cloud-semantic-layer-api-openapi.yml
  - type: NaftikoCapability
    url: capabilities/cloud-semantic-layer-metrics.yaml
