description: dbt Labs operates dbt Cloud, the managed platform for the open-source dbt (data build tool) used to transform
  data inside cloud warehouses. dbt Cloud exposes a set of APIs for managing accounts, projects, jobs, and runs programmatically
  (Administrative API), inspecting project metadata (Discovery API), and querying governed metrics (Semantic Layer API).
apis:
- aid: dbt:dbt-cloud-administrative-api
  name: dbt Cloud Administrative API
  description: The dbt Cloud Administrative API manages accounts, projects, jobs, runs, environments, and other resources.
    It is the primary integration point for external orchestrators (Airflow, Dagster, Prefect) and for Terraform-based management
    of dbt Cloud configuration.
  humanURL: https://docs.getdbt.com/docs/dbt-cloud-apis/admin-cloud-api
  baseURL: https://cloud.getdbt.com/api/v3
  tags:
  - Accounts
  - Administration
  - Jobs
  - Projects
  - Runs
  properties:
  - type: Documentation
    url: https://docs.getdbt.com/docs/dbt-cloud-apis/admin-cloud-api
