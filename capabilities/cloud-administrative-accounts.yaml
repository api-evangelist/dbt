naftiko: 1.0.0-alpha2
info:
  label: dbt Cloud Administrative API — Accounts
  description: 'dbt Cloud Administrative API — Accounts. 1 operations. Lead operation: List accounts. Self-contained Naftiko
    capability covering one Dbt business surface.'
  tags:
  - Dbt
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DBT_API_KEY: DBT_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-administrative-accounts
    baseUri: https://cloud.getdbt.com/api/v3
    description: dbt Cloud Administrative API — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: accounts
      path: /accounts/
      operations:
      - name: listaccounts
        method: GET
        description: List accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DBT_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-administrative-accounts-rest
    port: 8080
    description: REST adapter for dbt Cloud Administrative API — Accounts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts
      name: accounts
      description: REST surface for accounts.
      operations:
      - method: GET
        name: listaccounts
        description: List accounts
        call: cloud-administrative-accounts.listaccounts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-administrative-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for dbt Cloud Administrative API — Accounts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-accounts
      description: List accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-administrative-accounts.listaccounts
      outputParameters:
      - type: object
        mapping: $.
